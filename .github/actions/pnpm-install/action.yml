########################################################################################
# "pnpm install" composite action for pnpm 9+                                         #
#--------------------------------------------------------------------------------------#
# Requirement: @setup/node should be run before                                       #
#                                                                                      #
# Usage in workflows steps:                                                           #
#                                                                                      #
#      - name: 📥 Monorepo install                                                    #
#        uses: ./.github/actions/pnpm-install                                         #
#        with:                                                                        #
#          enable-corepack: false # (default)                                         #
#          cwd: ${{ github.workspace }} # (default = '.')                            #
#                                                                                      #
########################################################################################

name: 'PNPM install'
description: 'Run pnpm install with optimized cache'

inputs:
  enable-corepack:
    description: 'Enable corepack'
    required: false
    default: 'false'
  cwd:
    description: "Changes node's process.cwd() if the project is not located on the root. Default to process.cwd()"
    required: false
    default: '.'

runs:
  using: 'composite'

  steps:
    - name: ⚙️ Enable Corepack
      if: ${{ inputs.enable-corepack == 'true' }}
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        corepack enable
        echo "corepack enabled"

    - uses: pnpm/action-setup@v2
      if: ${{ inputs.enable-corepack == 'false' }}
      with:
        version: 9.8.0
        run_install: false

    - name: Expose pnpm config(s) through "$GITHUB_OUTPUT"
      id: pnpm-config
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache rotation keys
      id: cache-rotation
      shell: bash
      run: |
        echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-config.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

    - uses: actions/cache@v4
      name: Setup Turbo cache
      with:
        path: |
          .turbo
          node_modules/.cache
          **/.turbo
          **/node_modules/.cache
        key: ${{ runner.os }}-turbo-typecheck-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/turbo.json', '**/tsconfig.json', '**/*.ts', '**/*.tsx') }}
        restore-keys: |
          ${{ runner.os }}-turbo-typecheck-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-
          ${{ runner.os }}-turbo-typecheck-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: pnpm install --frozen-lockfile --prefer-offline
      env:
        HUSKY: '0' # By default do not run HUSKY install 