# .github/workflows/ci.yml
name: CI — Biome + Typecheck

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  SKIP_ENV_VALIDATION: "1"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: 🔍 Biome (check, no write)
        run: pnpm format-and-lint:check:all

      # Same as `pnpm typecheck:ci` locally: all workspaces (web, mobile, packages).
      - name: 🔧 Typecheck (Turbo, monorepo)
        run: pnpm typecheck:ci
